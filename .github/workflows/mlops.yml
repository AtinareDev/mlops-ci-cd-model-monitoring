name: MLOps CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  quality:
    name: Quality checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install

      - name: Run ruff lint
        run: uv run --with ruff ruff check .

      - name: Run ruff format check
        run: uv run --with ruff ruff format --check .

      - name: Run ty type check
        run: uv run --with ty ty check .

  tests:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install

      - name: Run tests
        run: uv run pytest -q

  train_validate_report:
    name: Train, validate and build report
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install

      - name: Run model pipeline
        run: uv run python scripts/run_model_pipeline.py

      - name: Validate metrics
        run: uv run python scripts/validate_metrics.py --threshold 0.80

      - name: Build HTML report
        run: uv run python scripts/build_report.py

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: public

  deploy_pages:
    name: Deploy GitHub Pages
    runs-on: ubuntu-latest
    needs: train_validate_report

    if: github.ref == 'refs/heads/main'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5